<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quovi — AI for your business dashboards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0f0f10; color: #ffffff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .container { text-align: center; max-width: 580px; padding: 2rem; }
    .logo {
      font-size: 2.8rem; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
    }
    .tagline {
      font-size: 1.15rem; color: #a1a1aa;
      margin-bottom: 2.5rem; line-height: 1.7;
    }
    .form { display: flex; gap: 0.5rem; max-width: 420px; margin: 0 auto 1rem; }
    input {
      flex: 1; padding: 0.8rem 1rem; border-radius: 8px;
      border: 1px solid #27272a; background: #18181b;
      color: #fff; font-size: 0.95rem; outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      padding: 0.8rem 1.25rem; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem;
      cursor: pointer; white-space: nowrap; font-weight: 500;
    }
    button:hover { background: #4f46e5; }
    .note { font-size: 0.8rem; color: #3f3f46; margin-top: 2rem; }
    .badge {
      display: inline-block; background: #18181b; border: 1px solid #27272a;
      color: #a1a1aa; font-size: 0.75rem; padding: 0.3rem 0.7rem;
      border-radius: 999px; margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🚧 Building in public · Early Access</div>
    <div class="logo">Quovi</div>
    <p class="tagline">
      Ask your Tableau &amp; Power BI dashboards anything.<br/>
      AI answers. No extra licenses needed.
    </p>
    <div class="form">
      <input type="email" placeholder="your@company.com" id="email"/>
      <button onclick="handleSubmit()">Get Early Access</button>
    </div>
    <p class="note">quovi.ai · We respect your inbox</p>
  </div>
  <script>
    function handleSubmit() {
      const email = document.getElementById('email').value;
      if (!email || !email.includes('@')) {
        alert('Please enter a valid email address.');
        return;
      }
      // Replace this URL with your email capture service (Resend, Mailchimp, etc.)
      alert('You\'re on the list! We\'ll be in touch at ' + email);
    }
  </script>
</body>
</html>
