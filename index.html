<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quovi — AI for your business dashboards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #0f0f10; color: #ffffff;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .container { text-align: center; max-width: 580px; padding: 2rem; }
    .logo { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { font-size: 1.2rem; color: #a1a1aa; margin: 1rem 0 2.5rem; line-height: 1.6; }
    .form { display: flex; gap: 0.5rem; max-width: 420px; margin: 0 auto; }
    input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px;
            border: 1px solid #27272a; background: #18181b;
            color: #fff; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button { padding: 0.75rem 1.25rem; background: #6366f1; color: #fff;
             border: none; border-radius: 8px; font-size: 0.95rem;
             cursor: pointer; white-space: nowrap; }
    button:hover { background: #4f46e5; }
    .note { font-size: 0.8rem; color: #52525b; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Quovi</div>
    <p class="tagline">
      Ask your Tableau &amp; Power BI dashboards anything.<br/>
      AI answers. No extra licenses needed.
    </p>
    <div class="form">
      <input type="email" placeholder="your@company.com" id="email"/>
      <button onclick="submit()">Get Early Access</button>
    </div>
    <p class="note">Building in public · quovi.ai</p>
  </div>
  <script>
    function submit() {
      const email = document.getElementById('email').value;
      if (email) { alert('Thanks! We will be in touch at ' + email); }
    }
  </script>
</body>
</html>
